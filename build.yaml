# This file generates the GitHub Actions matrix
# For simple board + shield combinations, add them
# to the top level board and shield arrays, for more
# control, add individual board + shield combinations to
# the `include` property, e.g:
#
# board: [ "nice_nano_v2" ]
# shield: [ "corne_left", "corne_right" ]
# include:
#   - board: bdn9_rev2
#   - board: nice_nano_v2
#     shield: reviung41
#
---
include:
  # sweep (cradio)
  - board: nice_nano_v2
    shield: cradio_dongle dongle_display
    snippet: common-config
    artifact-name: cradio_dongle
  - board: nice_nano_v2
    shield: cradio_left led_indicator
    snippet: common-config
    artifact-name: cradio_central_left
  - board: nice_nano_v2
    shield: cradio_left led_indicator
    snippet: common-config
    cmake-args: -DCONFIG_ZMK_SPLIT_ROLE_CENTRAL=n
    artifact-name: cradio_peripheral_left
  - board: nice_nano_v2
    shield: cradio_right led_indicator
    snippet: common-config
    artifact-name: cradio_peripheral_right

  - board: nice_nano_v2
    shield: settings_reset
